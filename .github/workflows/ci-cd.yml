name: CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install & run tests (if Node project)
        run: |
          if [ -f package.json ]; then
            npm ci
            if [ -f package-lock.json ] || [ -f yarn.lock ]; then
              echo "Dependency lockfile found."
            fi
            if npm test --silent; then
              echo "Tests passed"
            else
              echo "Tests failed (continuing to allow Docker build)."
            fi
          else
            echo "No package.json — skipping Node install/tests."
          fi

  docker-build-push:
    name: Build and Push Docker image
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/roro:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/roro:${{ github.sha }}

# Optional: add a deploy step using kubectl if you set a KUBECONFIG secret. Example (commented):
#      - name: Set up Kubeconfig
#        run: echo "${{ secrets.KUBECONFIG }}" | base64 --decode > $HOME/.kube/config
