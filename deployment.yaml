apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello-world-nginx-deployment
  labels:
    app: hello-world-nginx
spec:
  replicas: 2
  selector:
    matchLabels:
      app: hello-world-nginx
  template:
    metadata:
      labels:
        app: hello-world-nginx
    spec:
      containers:
        - name: nginx
          image: mamkm/hello-world-nginx:latest
          ports:
            - containerPort: 80
